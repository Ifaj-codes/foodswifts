<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="bg-primary text-white p-3 d-flex justify-content-between mb-4">
        <span>Deliver | About Us | Menu</span>
        <span>Place an Order!</span>
    </div>

    <div class="container">
        <form method="POST">
            {% csrf_token %}
        <div class="row">
    {% for item in items %}
    <div class="col-md-4 mb-4 text-center">
      
        <img src="{{ item.image}}" style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px;">
        
       
        <div class="form-check mt-3 d-flex justify-content-center align-items-center">
            <input class="form-check-input" type="checkbox" name="items[]" value="{{ item.id }}" style="margin-right: 10px; position: relative;">
            <label class="form-check-label font-weight-bold">{{ item.name }}</label>
        </div>
        
     
        <div class="font-weight-bold mt-2 text-secondary">
            Price: {{ item.price }}
        </div>
    </div>
    {% endfor %}
</div>
            <br>
<a href="{% url 'payment' %}" style="background-color: #e2136e; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold;">
    Pay with bKash
</a>
            <button type="submit" class="btn btn-dark mt-3 px-5">PLACE ORDER!</button>
        </form>
    </div>
</body>
</html>
