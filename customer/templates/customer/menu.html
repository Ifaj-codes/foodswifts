<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="bg-primary text-white p-3 d-flex justify-content-between mb-4">
        <span>Deliver | About Us | Menu</span>
        <span>Place an Order!</span>
    </div>

    <div class="container">
        <form method="POST">
            {% csrf_token %}
           
            {% for item in items %}
            <div class="row mb-3 border-bottom pb-3 align-items-center">
                <div class="col-md-2">
                    <img src="{{ item.image }}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px;">
                </div>
                <div class="col-md-8">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="items[]" value="{{ item.id }}">
                        <label class="form-check-label font-weight-bold">
                            {{ item.name }}
                        </label>
                    </div>
                </div>
                <div class="col-md-2 font-weight-bold">
                    {{ item.price }}
                </div>
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-dark mt-3 px-5">PLACE ORDER!</button>
        </form>
    </div>
</body>
</html>
